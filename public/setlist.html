<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Órale — Setlist Builder</title>
  <script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.0/Sortable.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0f0f0f;
      --surface: #1a1a1a;
      --surface2: #242424;
      --border: #333;
      --accent: #e8b84b;
      --text: #f0f0f0;
      --muted: #888;
      --danger: #e05c5c;
      --green: #4caf75;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
    }

    header {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 14px 24px;
      display: flex;
      align-items: center;
      gap: 12px;
    }

    header h1 { font-size: 1.3rem; font-weight: 700; color: var(--accent); }
    header span { color: var(--muted); font-size: 0.9rem; }

    .layout {
      display: grid;
      grid-template-columns: 1fr 1fr;
      height: calc(100vh - 53px);
    }

    @media (max-width: 700px) {
      .layout { grid-template-columns: 1fr; height: auto; }
    }

    /* ── Song Pool ── */
    .pool-panel {
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .panel-header {
      padding: 10px 14px;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .panel-title {
      font-size: 0.75rem;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--muted);
    }

    .filters { display: flex; gap: 8px; }

    input[type="text"], input[type="date"], select {
      background: var(--surface2);
      border: 1px solid var(--border);
      color: var(--text);
      border-radius: 6px;
      padding: 6px 10px;
      font-size: 0.83rem;
      outline: none;
      color-scheme: dark;
    }

    input[type="text"]:focus, input[type="date"]:focus, select:focus {
      border-color: var(--accent);
    }

    #search { flex: 1; }

    .song-list {
      overflow-y: auto;
      flex: 1;
      padding: 8px;
    }

    .song-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 9px 12px;
      margin-bottom: 5px;
      cursor: grab;
      display: flex;
      align-items: center;
      gap: 10px;
      transition: border-color 0.12s, background 0.12s;
      user-select: none;
    }

    .song-card:active { cursor: grabbing; }
    .song-card:hover { border-color: var(--accent); background: var(--surface2); }

    .song-card.in-setlist {
      opacity: 0.35;
      cursor: default;
      pointer-events: none;
    }

    .song-info { flex: 1; min-width: 0; }

    .song-title {
      font-weight: 600;
      font-size: 0.88rem;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .song-meta {
      font-size: 0.73rem;
      color: var(--muted);
      display: flex;
      gap: 5px;
      flex-wrap: wrap;
      margin-top: 2px;
      align-items: center;
    }

    .feel-tag {
      font-size: 0.68rem;
      padding: 1px 5px;
      border-radius: 3px;
      background: var(--surface2);
      border: 1px solid var(--border);
    }

    .key-badge {
      background: var(--accent);
      color: #000;
      font-weight: 700;
      font-size: 0.7rem;
      padding: 2px 7px;
      border-radius: 4px;
      flex-shrink: 0;
    }

    .yt-link {
      color: var(--muted);
      text-decoration: none;
      font-size: 0.9rem;
      flex-shrink: 0;
      transition: color 0.12s;
      line-height: 1;
    }
    .yt-link:hover { color: #ff4444; }

    /* ── Setlist Panel ── */
    .setlist-panel {
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .setlist-meta {
      padding: 10px 14px;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      gap: 7px;
    }

    .meta-row { display: flex; gap: 8px; }
    .meta-row input, .meta-row select { flex: 1; }

    .setlist-drop {
      flex: 1;
      overflow-y: auto;
      padding: 8px;
    }

    .drop-hint {
      text-align: center;
      color: var(--muted);
      font-size: 0.83rem;
      padding: 36px 20px;
      border: 2px dashed var(--border);
      border-radius: 8px;
      margin: 4px;
      pointer-events: none;
    }

    .setlist-item {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 9px 12px;
      margin-bottom: 5px;
      display: flex;
      align-items: center;
      gap: 10px;
      cursor: grab;
      user-select: none;
      transition: border-color 0.12s;
    }

    .setlist-item:active { cursor: grabbing; }
    .setlist-item:hover { border-color: var(--accent); }

    .item-num {
      font-size: 0.72rem;
      color: var(--accent);
      font-weight: 700;
      width: 18px;
      text-align: right;
      flex-shrink: 0;
    }

    .item-info { flex: 1; min-width: 0; }

    .item-title {
      font-weight: 600;
      font-size: 0.88rem;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .item-sub {
      font-size: 0.73rem;
      color: var(--muted);
      margin-top: 2px;
    }

    .remove-btn {
      background: none;
      border: none;
      color: var(--muted);
      cursor: pointer;
      font-size: 0.85rem;
      padding: 3px 5px;
      border-radius: 4px;
      transition: color 0.12s;
      flex-shrink: 0;
      line-height: 1;
    }
    .remove-btn:hover { color: var(--danger); }

    .setlist-footer {
      padding: 10px 14px;
      background: var(--surface);
      border-top: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      flex-wrap: wrap;
    }

    .setlist-stats { font-size: 0.83rem; color: var(--muted); }
    .setlist-stats strong { color: var(--text); }

    .btn-group { display: flex; gap: 7px; }

    button {
      padding: 7px 14px;
      border-radius: 6px;
      font-size: 0.83rem;
      font-weight: 600;
      cursor: pointer;
      border: none;
      transition: opacity 0.12s;
    }

    button:disabled { opacity: 0.4; cursor: not-allowed; }

    .btn-primary { background: var(--accent); color: #000; }
    .btn-secondary { background: var(--surface2); color: var(--text); border: 1px solid var(--border); }
    .btn-primary:hover:not(:disabled) { opacity: 0.82; }
    .btn-secondary:hover:not(:disabled) { border-color: var(--accent); }

    /* Toast */
    #toast {
      position: fixed;
      bottom: 24px;
      left: 50%;
      transform: translateX(-50%) translateY(80px);
      background: var(--surface);
      border: 1px solid var(--border);
      color: var(--text);
      padding: 9px 18px;
      border-radius: 8px;
      font-size: 0.83rem;
      transition: transform 0.25s ease;
      z-index: 999;
      white-space: nowrap;
      pointer-events: none;
    }
    #toast.show { transform: translateX(-50%) translateY(0); }
    #toast.success { border-color: var(--green); color: var(--green); }
    #toast.error { border-color: var(--danger); color: var(--danger); }

    .loading { text-align: center; padding: 36px; color: var(--muted); font-size: 0.85rem; }

    .sortable-ghost { opacity: 0.25; background: var(--surface2); }
    .sortable-chosen { border-color: var(--accent) !important; }

    /* ── Print ── */
    #print-header, #print-footer { display: none; }

    @media print {
      body { background: #fff; color: #000; font-family: Georgia, serif; }

      header, .pool-panel, .setlist-meta, .setlist-footer,
      .remove-btn, .yt-link, #toast { display: none !important; }

      .layout { display: block; height: auto; }
      .setlist-panel { display: block; overflow: visible; }
      .setlist-drop { overflow: visible; padding: 0; }

      #print-header {
        display: block !important;
        text-align: center;
        padding-bottom: 18px;
        margin-bottom: 20px;
        border-bottom: 2px solid #000;
      }
      #print-header h1 { font-size: 2rem; letter-spacing: 0.04em; }
      #print-header p { font-size: 1rem; color: #444; margin-top: 4px; }

      .setlist-item {
        background: #fff;
        border: none;
        border-bottom: 1px solid #e0e0e0;
        border-radius: 0;
        padding: 10px 0;
        color: #000;
        page-break-inside: avoid;
      }

      .item-num { color: #000; font-size: 0.85rem; }
      .item-title { font-size: 1rem; }
      .item-sub { color: #555; font-size: 0.85rem; }
      .key-badge { background: #000; color: #fff; font-size: 0.75rem; }

      .drop-hint { display: none; }

      #print-footer {
        display: block !important;
        margin-top: 18px;
        padding-top: 12px;
        border-top: 1px solid #ccc;
        font-size: 0.83rem;
        color: #666;
        text-align: right;
      }
    }
  </style>
</head>
<body>

<header>
  <h1>🎶 Órale</h1>
  <span>Setlist Builder</span>
</header>

<div id="print-header"></div>

<div class="layout">

  <!-- Song Pool -->
  <div class="pool-panel">
    <div class="panel-header">
      <div class="panel-title">Song Library &nbsp;<span id="pool-count" style="color:var(--text)"></span></div>
      <div class="filters">
        <input type="text" id="search" placeholder="Search…" />
        <select id="feel-filter">
          <option value="">All feels</option>
          <option>Dance</option>
          <option>Soul</option>
          <option>Latin</option>
          <option>Rock</option>
          <option>R&amp;B</option>
          <option>Slow Groove</option>
        </select>
      </div>
    </div>
    <div class="song-list" id="song-pool">
      <div class="loading">Loading songs from Notion…</div>
    </div>
  </div>

  <!-- Setlist -->
  <div class="setlist-panel">
    <div class="setlist-meta">
      <div class="meta-row">
        <input type="text" id="setlist-name" placeholder="Setlist name  (e.g. Pengilly's — Fri June 20)" />
      </div>
      <div class="meta-row">
        <select id="setlist-purpose">
          <option value="">Purpose…</option>
          <option>Dance Night</option>
          <option>Festival</option>
          <option>Wedding</option>
          <option>Corporate</option>
          <option>Opener</option>
          <option>Closer</option>
          <option>Custom</option>
        </select>
        <input type="date" id="setlist-date" />
      </div>
    </div>

    <div class="setlist-drop" id="setlist-drop">
      <div class="drop-hint">Drag songs here — or click a song to add it</div>
    </div>

    <div id="print-footer"></div>

    <div class="setlist-footer">
      <div class="setlist-stats">
        <strong id="stat-songs">0 songs</strong> &nbsp;·&nbsp; <strong id="stat-time">0:00</strong>
      </div>
      <div class="btn-group">
        <button class="btn-secondary" onclick="clearSetlist()">Clear</button>
        <button class="btn-secondary" onclick="printSetlist()">Print / PDF</button>
        <button class="btn-primary" id="save-btn" onclick="saveToNotion()">Save to Notion</button>
      </div>
    </div>
  </div>

</div>

<div id="toast"></div>

<script>
  let allSongs = [];
  let setlistSongs = [];

  // ── Load from Notion ──
  async function loadSongs() {
    try {
      const res = await fetch('/.netlify/functions/songs');
      allSongs = await res.json();
      renderPool();
    } catch {
      document.getElementById('song-pool').innerHTML =
        '<div class="loading" style="color:var(--danger)">Could not load songs. Check Netlify function + NOTION_TOKEN.</div>';
    }
  }

  // ── Pool ──
  function renderPool() {
    const search = document.getElementById('search').value.toLowerCase();
    const feel   = document.getElementById('feel-filter').value;
    const inSet  = new Set(setlistSongs.map(s => s.id));

    const filtered = allSongs.filter(s => {
      const matchSearch = !search || s.title.toLowerCase().includes(search) || s.artist.toLowerCase().includes(search);
      const matchFeel   = !feel  || s.feel.includes(feel);
      return matchSearch && matchFeel;
    });

    document.getElementById('pool-count').textContent = `(${filtered.length})`;

    document.getElementById('song-pool').innerHTML = filtered.map(s => `
      <div class="song-card ${inSet.has(s.id) ? 'in-setlist' : ''}" data-id="${s.id}">
        <div class="song-info">
          <div class="song-title">${escHtml(s.title)}</div>
          <div class="song-meta">
            <span>${escHtml(s.artist)}</span>
            ${s.duration ? `<span>· ${s.duration} min</span>` : ''}
            ${s.feel.map(f => `<span class="feel-tag">${f}</span>`).join('')}
          </div>
        </div>
        <span class="key-badge">${s.key || '?'}</span>
        ${s.youtube ? `<a class="yt-link" href="${s.youtube}" target="_blank" title="YouTube reference" onclick="event.stopPropagation()">▶</a>` : ''}
      </div>
    `).join('');

    document.querySelectorAll('.song-card:not(.in-setlist)').forEach(card => {
      card.addEventListener('click', () => addToSetlist(card.dataset.id));
    });

    initPoolSortable();
  }

  // ── Setlist ──
  function renderSetlist() {
    const drop = document.getElementById('setlist-drop');

    if (setlistSongs.length === 0) {
      drop.innerHTML = '<div class="drop-hint">Drag songs here — or click a song to add it</div>';
    } else {
      drop.innerHTML = setlistSongs.map((s, i) => `
        <div class="setlist-item" data-id="${s.id}">
          <span class="item-num">${i + 1}</span>
          <span class="key-badge">${s.key || '?'}</span>
          <div class="item-info">
            <div class="item-title">${escHtml(s.title)}</div>
            <div class="item-sub">${escHtml(s.artist)}${s.duration ? ` · ${s.duration} min` : ''}</div>
          </div>
          <button class="remove-btn" data-remove="${s.id}" title="Remove">✕</button>
        </div>
      `).join('');

      drop.querySelectorAll('[data-remove]').forEach(btn => {
        btn.addEventListener('click', () => removeFromSetlist(btn.dataset.remove));
      });
    }

    initSetlistSortable();
    updateStats();
    renderPool();
  }

  function addToSetlist(id) {
    const song = allSongs.find(s => s.id === id);
    if (!song || setlistSongs.find(s => s.id === id)) return;
    setlistSongs.push(song);
    renderSetlist();
  }

  function removeFromSetlist(id) {
    setlistSongs = setlistSongs.filter(s => s.id !== id);
    renderSetlist();
  }

  function clearSetlist() {
    if (setlistSongs.length === 0) return;
    setlistSongs = [];
    renderSetlist();
  }

  function updateStats() {
    const total = setlistSongs.reduce((sum, s) => sum + (s.duration || 0), 0);
    const h   = Math.floor(total / 60);
    const m   = Math.floor(total % 60);
    const sec = Math.round((total % 1) * 60);
    document.getElementById('stat-songs').textContent = `${setlistSongs.length} song${setlistSongs.length !== 1 ? 's' : ''}`;
    document.getElementById('stat-time').textContent  = h > 0 ? `${h}h ${m}m` : `${m}:${String(sec).padStart(2,'0')}`;
  }

  // ── Sortable: pool (drag source only) ──
  function initPoolSortable() {
    Sortable.create(document.getElementById('song-pool'), {
      group: { name: 'songs', pull: 'clone', put: false },
      sort: false,
      animation: 150,
      onEnd(evt) {
        if (evt.to.id === 'setlist-drop') {
          evt.item.remove();
          addToSetlist(evt.item.dataset.id);
        }
      },
    });
  }

  // ── Sortable: setlist (reorder + drop target) ──
  function initSetlistSortable() {
    Sortable.create(document.getElementById('setlist-drop'), {
      group: { name: 'songs', pull: false, put: true },
      animation: 150,
      ghostClass: 'sortable-ghost',
      chosenClass: 'sortable-chosen',
      onAdd(evt) {
        evt.item.remove();
        addToSetlist(evt.item.dataset.id);
      },
      onUpdate() {
        const items = document.querySelectorAll('#setlist-drop .setlist-item');
        const reordered = [];
        items.forEach(el => {
          const s = setlistSongs.find(x => x.id === el.dataset.id);
          if (s) reordered.push(s);
        });
        setlistSongs = reordered;
        renderSetlist();
      },
    });
  }

  // ── Filters ──
  document.getElementById('search').addEventListener('input', renderPool);
  document.getElementById('feel-filter').addEventListener('change', renderPool);

  // ── Default date = today ──
  document.getElementById('setlist-date').value = new Date().toISOString().split('T')[0];

  // ── Print ──
  function printSetlist() {
    if (!setlistSongs.length) { showToast('Add songs before printing', 'error'); return; }
    const name = document.getElementById('setlist-name').value || 'Setlist';
    const rawDate = document.getElementById('setlist-date').value;
    const dateStr = rawDate
      ? new Date(rawDate + 'T12:00').toLocaleDateString('en-US', { year: 'numeric', month: 'long', day: 'numeric' })
      : '';
    const total = setlistSongs.reduce((s, x) => s + (x.duration || 0), 0);
    const h = Math.floor(total / 60), m = Math.floor(total % 60);

    document.getElementById('print-header').innerHTML = `
      <h1>🎶 Órale</h1>
      <p>${escHtml(name)}${dateStr ? ' &nbsp;·&nbsp; ' + dateStr : ''}</p>
    `;
    document.getElementById('print-footer').innerHTML =
      `${setlistSongs.length} songs &nbsp;·&nbsp; Total: ${h > 0 ? `${h}h ${m}m` : `${Math.floor(total)}m`}`;

    window.print();
  }

  // ── Save to Notion ──
  async function saveToNotion() {
    if (!setlistSongs.length) { showToast('Add songs before saving', 'error'); return; }
    const name = document.getElementById('setlist-name').value.trim();
    if (!name) { showToast('Enter a setlist name first', 'error'); return; }

    const btn = document.getElementById('save-btn');
    btn.disabled = true;
    btn.textContent = 'Saving…';

    try {
      const res = await fetch('/.netlify/functions/save-setlist', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          name,
          songs: setlistSongs,
          purpose: document.getElementById('setlist-purpose').value || undefined,
          date:    document.getElementById('setlist-date').value,
        }),
      });

      const data = await res.json();
      if (data.ok) {
        showToast('Saved to Notion ✓', 'success');
      } else {
        showToast(`Save failed: ${data.error || 'unknown error'}`, 'error');
      }
    } catch {
      showToast('Save failed — check connection', 'error');
    } finally {
      btn.disabled = false;
      btn.textContent = 'Save to Notion';
    }
  }

  // ── Util ──
  function escHtml(str) {
    return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  function showToast(msg, type = '') {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.className = `show ${type}`;
    setTimeout(() => { t.className = ''; }, 3000);
  }

  loadSongs();
</script>
</body>
</html>
