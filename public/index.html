<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Órale — Setlist Builder</title>
  <script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.0/Sortable.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0f0f0f;
      --surface: #1a1a1a;
      --surface2: #242424;
      --border: #333;
      --accent: #e8b84b;
      --text: #f0f0f0;
      --muted: #888;
      --danger: #e05c5c;
      --green: #4caf75;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
    }

    header {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 14px 24px;
      display: flex;
      align-items: center;
      gap: 12px;
    }

    header h1 { font-size: 1.3rem; font-weight: 700; color: var(--accent); }
    header span { color: var(--muted); font-size: 0.9rem; }

    .layout {
      display: grid;
      grid-template-columns: 1fr 1fr;
      height: calc(100vh - 53px);
    }

    /* ── Mobile tab bar ── */
    #tab-bar {
      display: none;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
    }

    .tab-btn {
      flex: 1;
      padding: 11px 8px;
      background: none;
      border: none;
      border-bottom: 3px solid transparent;
      color: var(--muted);
      font-size: 0.88rem;
      font-weight: 600;
      cursor: pointer;
      border-radius: 0;
      transition: color 0.15s;
    }

    .tab-btn.active { color: var(--accent); border-bottom-color: var(--accent); }

    .tab-badge {
      display: none;
      background: var(--accent);
      color: #000;
      font-size: 0.65rem;
      font-weight: 800;
      padding: 1px 6px;
      border-radius: 10px;
      margin-left: 4px;
      vertical-align: middle;
      line-height: 1.4;
    }

    @media (max-width: 700px) {
      #tab-bar { display: flex; }
      .layout { grid-template-columns: 1fr; height: calc(100dvh - 53px - 43px); }
      .pool-panel { border-right: none; }
      .panel-hidden { display: none !important; }
      .setlist-footer { flex-direction: column; gap: 8px; padding: 10px 12px; }
      .setlist-stats { text-align: center; }
      .btn-group { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 5px; }
      .btn-group button { padding: 9px 4px; font-size: 0.75rem; }
      .remove-btn { padding: 8px 12px; font-size: 1rem; }
      .drop-hint { padding: 28px 16px; }
      .filters { flex-wrap: wrap; }
      #search { flex: 1 1 100%; }
    }

    /* ── Song Pool ── */
    .pool-panel {
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .panel-header {
      padding: 10px 14px;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .panel-title {
      font-size: 0.75rem;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--muted);
    }

    .filters { display: flex; gap: 8px; align-items: center; }

    .hw-filter {
      display: flex;
      align-items: center;
      gap: 5px;
      font-size: 0.8rem;
      color: var(--text);
      white-space: nowrap;
      cursor: pointer;
      user-select: none;
    }
    .hw-filter input { cursor: pointer; }

    .hw-badge {
      font-size: 0.7rem;
      flex-shrink: 0;
    }

    .btn-tiny {
      background: var(--surface2);
      color: var(--text);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 6px 10px;
      font-size: 0.78rem;
      cursor: pointer;
      white-space: nowrap;
      flex-shrink: 0;
    }
    .btn-tiny:hover { border-color: var(--accent); }

    input[type="text"], input[type="date"], select {
      background: var(--surface2);
      border: 1px solid var(--border);
      color: var(--text);
      border-radius: 6px;
      padding: 6px 10px;
      font-size: 0.83rem;
      outline: none;
      color-scheme: dark;
    }

    input[type="text"]:focus, input[type="date"]:focus, select:focus {
      border-color: var(--accent);
    }

    #search { flex: 1; }

    .song-list {
      overflow-y: auto;
      flex: 1;
      padding: 8px;
    }

    .song-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 9px 12px;
      margin-bottom: 5px;
      cursor: grab;
      display: flex;
      align-items: center;
      gap: 10px;
      transition: border-color 0.12s, background 0.12s;
      user-select: none;
    }

    .song-card:active { cursor: grabbing; }
    .song-card:hover { border-color: var(--accent); background: var(--surface2); }

    .song-card.in-setlist {
      opacity: 0.35;
      cursor: default;
      pointer-events: none;
    }

    .song-info { flex: 1; min-width: 0; }

    .song-title {
      font-weight: 600;
      font-size: 0.88rem;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .song-meta {
      font-size: 0.73rem;
      color: var(--muted);
      display: flex;
      gap: 5px;
      flex-wrap: wrap;
      margin-top: 2px;
      align-items: center;
    }

    .feel-tag {
      font-size: 0.68rem;
      padding: 1px 5px;
      border-radius: 3px;
      background: var(--surface2);
      border: 1px solid var(--border);
    }

    .key-badge {
      background: var(--accent);
      color: #000;
      font-weight: 700;
      font-size: 0.7rem;
      padding: 2px 7px;
      border-radius: 4px;
      flex-shrink: 0;
    }

    .yt-link {
      color: var(--muted);
      text-decoration: none;
      font-size: 0.9rem;
      flex-shrink: 0;
      transition: color 0.12s;
      line-height: 1;
    }
    .yt-link:hover { color: #ff4444; }

    .yt-badge {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      background: #000;
      color: #fff;
      font-weight: 800;
      font-size: 0.6rem;
      letter-spacing: 0.04em;
      width: 22px;
      height: 18px;
      border-radius: 4px;
      text-decoration: none;
      flex-shrink: 0;
      font-family: sans-serif;
    }
    .yt-badge:hover { background: #c00; }
    .yt-badge-stage { width: 30px; height: 22px; font-size: 0.75rem; }

    .yt-url-print { display: none; }

    /* ── Setlist Panel ── */
    .setlist-panel {
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .setlist-meta {
      padding: 10px 14px;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      gap: 7px;
    }

    .meta-row { display: flex; gap: 8px; }
    .meta-row input, .meta-row select { flex: 1; }

    .setlist-drop {
      flex: 1;
      overflow-y: auto;
      padding: 8px;
    }

    .drop-hint {
      text-align: center;
      color: var(--muted);
      font-size: 0.83rem;
      padding: 36px 20px;
      border: 2px dashed var(--border);
      border-radius: 8px;
      margin: 4px;
      pointer-events: none;
    }

    .setlist-item {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 9px 12px;
      margin-bottom: 5px;
      display: flex;
      align-items: center;
      gap: 10px;
      cursor: grab;
      user-select: none;
      transition: border-color 0.12s;
    }

    .setlist-item:active { cursor: grabbing; }
    .setlist-item:hover { border-color: var(--accent); }

    .item-num {
      font-size: 0.72rem;
      color: var(--accent);
      font-weight: 700;
      width: 18px;
      text-align: right;
      flex-shrink: 0;
    }

    .item-info { flex: 1; min-width: 0; }

    .item-title {
      font-weight: 600;
      font-size: 0.88rem;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .item-sub {
      font-size: 0.73rem;
      color: var(--muted);
      margin-top: 2px;
    }

    .remove-btn {
      background: none;
      border: none;
      color: var(--muted);
      cursor: pointer;
      font-size: 0.85rem;
      padding: 3px 5px;
      border-radius: 4px;
      transition: color 0.12s;
      flex-shrink: 0;
      line-height: 1;
    }
    .remove-btn:hover { color: var(--danger); }

    .setlist-footer {
      padding: 10px 14px;
      background: var(--surface);
      border-top: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      flex-wrap: wrap;
    }

    .setlist-stats { font-size: 0.83rem; color: var(--muted); }
    .setlist-stats strong { color: var(--text); }

    .btn-group { display: flex; gap: 7px; }

    button {
      padding: 7px 14px;
      border-radius: 6px;
      font-size: 0.83rem;
      font-weight: 600;
      cursor: pointer;
      border: none;
      transition: opacity 0.12s;
    }

    button:disabled { opacity: 0.4; cursor: not-allowed; }

    .btn-primary { background: var(--accent); color: #000; }
    .btn-secondary { background: var(--surface2); color: var(--text); border: 1px solid var(--border); }
    .btn-primary:hover:not(:disabled) { opacity: 0.82; }
    .btn-secondary:hover:not(:disabled) { border-color: var(--accent); }

    /* Toast */
    #toast {
      position: fixed;
      bottom: 24px;
      left: 50%;
      transform: translateX(-50%) translateY(80px);
      background: var(--surface);
      border: 1px solid var(--border);
      color: var(--text);
      padding: 9px 18px;
      border-radius: 8px;
      font-size: 0.83rem;
      transition: transform 0.25s ease;
      z-index: 999;
      white-space: nowrap;
      pointer-events: none;
    }
    #toast.show { transform: translateX(-50%) translateY(0); }
    #toast.success { border-color: var(--green); color: var(--green); }
    #toast.error { border-color: var(--danger); color: var(--danger); }

    .loading { text-align: center; padding: 36px; color: var(--muted); font-size: 0.85rem; }

    /* ── Scrollbars ── */
    .song-list, .setlist-drop {
      -webkit-overflow-scrolling: touch;
      scrollbar-width: thin;
      scrollbar-color: #555 transparent;
    }
    .song-list::-webkit-scrollbar,
    .setlist-drop::-webkit-scrollbar { width: 6px; }
    .song-list::-webkit-scrollbar-track,
    .setlist-drop::-webkit-scrollbar-track { background: var(--surface2); border-radius: 4px; }
    .song-list::-webkit-scrollbar-thumb,
    .setlist-drop::-webkit-scrollbar-thumb { background: #555; border-radius: 4px; }
    .song-list::-webkit-scrollbar-thumb:hover,
    .setlist-drop::-webkit-scrollbar-thumb:hover { background: var(--accent); }

    /* ── Landscape phone: compact cards so more fit in view ── */
    @media (max-height: 520px) and (orientation: landscape) {
      .song-card, .setlist-item { padding: 6px 10px; margin-bottom: 3px; }
      .song-meta { margin-top: 1px; }
      .panel-header { padding: 7px 12px; gap: 6px; }
      .setlist-meta { padding: 6px 12px; gap: 5px; }
    }

    .sortable-ghost { opacity: 0.25; background: var(--surface2); }
    .sortable-chosen { border-color: var(--accent) !important; }

    /* ── Set Break divider ── */
    .set-break {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 6px 4px;
      margin-bottom: 5px;
      cursor: grab;
      user-select: none;
    }
    .set-break:active { cursor: grabbing; }
    .set-break-line { flex: 1; height: 2px; background: var(--accent); opacity: 0.35; border-radius: 1px; }
    .set-break-label {
      font-size: 0.72rem;
      font-weight: 800;
      color: var(--accent);
      text-transform: uppercase;
      letter-spacing: 0.12em;
      white-space: nowrap;
      flex-shrink: 0;
    }

    /* Stage Print: set break row */
    .stage-break-row {
      column-span: all;
      padding: 12px 0 8px;
      text-align: center;
      border-top: 2px solid #ccc;
      border-bottom: 2px solid #ccc;
      margin: 8px 0;
    }
    .stage-break-label {
      font-size: 1.1rem;
      font-weight: 700;
      color: #888;
      letter-spacing: 0.14em;
      text-transform: uppercase;
    }

    /* ── Stage Print overlay ── */
    #stage-print-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: #fff;
      color: #000;
      z-index: 9999;
      padding: 32px 40px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      overflow-y: auto;
    }

    #stage-print-overlay.visible { display: block; }

    #stage-print-overlay h1 {
      font-size: 1.4rem;
      font-weight: 700;
      margin-bottom: 2px;
    }

    #stage-print-overlay .stage-sub {
      font-size: 1rem;
      color: #555;
      margin-bottom: 24px;
      padding-bottom: 16px;
      border-bottom: 2px solid #000;
    }

    .stage-songs {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 0 52px;
      margin-top: 12px;
    }

    .stage-col-header {
      font-size: 1.35rem;
      font-weight: 700;
      color: #000;
      padding-bottom: 6px;
      margin-bottom: 2px;
    }

    .stage-row {
      display: grid;
      grid-template-columns: 32px 1fr auto;
      align-items: baseline;
      gap: 0 10px;
      padding: 6px 0;
      border-bottom: 1px solid #e8e8e8;
      break-inside: avoid;
      page-break-inside: avoid;
    }

    .stage-num {
      font-size: 1.1rem;
      font-weight: 700;
      color: #888;
      text-align: right;
    }

    .stage-title {
      font-size: 1.5rem;
      font-weight: 700;
    }

    .stage-key {
      font-size: 1.3rem;
      font-weight: 700;
      color: #333;
    }

    .stage-bpm { display: none; }

    .stage-footer-row { display: none; }

    #stage-close-btn {
      position: fixed;
      top: 16px;
      right: 20px;
      background: #000;
      color: #fff;
      border: none;
      padding: 8px 16px;
      border-radius: 6px;
      font-size: 0.85rem;
      font-weight: 600;
      cursor: pointer;
    }

    /* ── Rehearsal notes (shown only in Rehearsal print) ── */
    .item-notes { display: none; }
    @media print {
      body.rehearsal-print .item-notes {
        display: block;
        margin-top: 5px;
        padding: 6px 9px;
        background: #f5f5f5;
        border-left: 3px solid #000;
        font-size: 0.8rem;
        color: #333;
        white-space: pre-wrap;
      }
      body.rehearsal-print .item-notes-label {
        font-weight: 700;
        text-transform: uppercase;
        font-size: 0.65rem;
        letter-spacing: 0.05em;
        color: #000;
      }
    }

    /* ── Load Setlist Modal ── */
    #load-modal-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.7);
      z-index: 8888;
      align-items: center;
      justify-content: center;
    }
    #load-modal-overlay.visible { display: flex; }

    #load-modal {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      width: 420px;
      max-width: 94vw;
      max-height: 80vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    #load-modal-header {
      padding: 14px 16px;
      border-bottom: 1px solid var(--border);
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    #load-modal-header h2 { font-size: 0.95rem; font-weight: 700; }

    #load-modal-close {
      background: none;
      border: none;
      color: var(--muted);
      font-size: 1rem;
      cursor: pointer;
      padding: 2px 6px;
    }

    #load-modal-list {
      overflow-y: auto;
      flex: 1;
      padding: 8px;
    }

    .setlist-option {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      padding: 10px 12px;
      border-radius: 7px;
      border: 1px solid var(--border);
      margin-bottom: 5px;
      cursor: pointer;
      transition: border-color 0.12s, background 0.12s;
    }

    .setlist-option:hover { border-color: var(--accent); background: var(--surface2); }

    .setlist-option-info { flex: 1; min-width: 0; }
    .setlist-option-name { font-weight: 600; font-size: 0.88rem; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .setlist-option-meta { font-size: 0.73rem; color: var(--muted); margin-top: 2px; }

    .setlist-option-load {
      background: var(--accent);
      color: #000;
      border: none;
      border-radius: 5px;
      padding: 5px 12px;
      font-size: 0.78rem;
      font-weight: 700;
      cursor: pointer;
      flex-shrink: 0;
    }

    .setlist-option-append {
      background: none;
      color: var(--accent);
      border: 1px solid var(--accent);
      border-radius: 5px;
      padding: 5px 10px;
      font-size: 0.78rem;
      font-weight: 700;
      cursor: pointer;
      flex-shrink: 0;
    }

    .setlist-option-btns { display: flex; gap: 5px; flex-shrink: 0; }

    @media print {
      body.stage-printing > *:not(#stage-print-overlay) { display: none !important; }
      body.stage-printing #stage-print-overlay {
        display: block !important;
        position: static;
        padding: 0;
      }
      body.stage-printing .stage-row { padding: 4px 0; }
      #stage-close-btn { display: none !important; }
    }

    /* ── Print ── */
    #print-header, #print-footer { display: none; }

    @media print {
      body { background: #fff; color: #000; font-family: Georgia, serif; }

      header, #tab-bar, .pool-panel, .setlist-meta, .setlist-footer,
      .remove-btn, .yt-link, #toast { display: none !important; }

      .layout { display: block; height: auto; }
      .setlist-panel { display: block; overflow: visible; }
      .setlist-drop { overflow: visible; padding: 0; }

      #print-header {
        display: block !important;
        text-align: center;
        padding-bottom: 18px;
        margin-bottom: 20px;
        border-bottom: 2px solid #000;
      }
      #print-header h1 { font-size: 2rem; letter-spacing: 0.04em; }
      #print-header p { font-size: 1rem; color: #444; margin-top: 4px; }

      .setlist-item {
        background: #fff;
        border: none;
        border-bottom: 1px solid #e0e0e0;
        border-radius: 0;
        padding: 10px 0;
        color: #000;
        page-break-inside: avoid;
      }

      .item-num { color: #000; font-size: 0.85rem; }
      .item-title { font-size: 1rem; }
      .item-sub { color: #555; font-size: 0.85rem; }
      .yt-url-print { display: block; font-size: 0.68rem; color: #888; margin-top: 2px; word-break: break-all; }
      .key-badge { background: #000; color: #fff; font-size: 0.75rem; }

      .drop-hint { display: none; }

      #print-footer {
        display: block !important;
        margin-top: 18px;
        padding-top: 12px;
        border-top: 1px solid #ccc;
        font-size: 0.83rem;
        color: #666;
        text-align: right;
      }
    }
  </style>
</head>
<body>

<header>
  <h1>🎶 Órale</h1>
  <span>Setlist Builder</span>
</header>

<div id="tab-bar">
  <button class="tab-btn active" id="tab-library" onclick="switchTab('library')">Song Library</button>
  <button class="tab-btn" id="tab-setlist-btn" onclick="switchTab('setlist')">Setlist <span id="tab-badge" class="tab-badge"></span></button>
</div>

<div id="print-header"></div>

<div class="layout">

  <!-- Song Pool -->
  <div class="pool-panel">
    <div class="panel-header">
      <div class="panel-title">Song Library &nbsp;<span id="pool-count" style="color:var(--text)"></span></div>
      <div class="filters">
        <input type="text" id="search" placeholder="Search…" />
        <select id="feel-filter">
          <option value="">All feels</option>
          <option>Dance</option>
          <option>Soul</option>
          <option>Latin</option>
          <option>Rock</option>
          <option>R&amp;B</option>
          <option>Slow Groove</option>
        </select>
        <label class="hw-filter">
          <input type="checkbox" id="homework-filter" /> 📝 Homework
        </label>
        <button class="btn-tiny" id="add-all-btn" onclick="addAllFiltered()">+ Add All</button>
      </div>
    </div>
    <div class="song-list" id="song-pool">
      <div class="loading">Loading songs from Notion…</div>
    </div>
  </div>

  <!-- Setlist -->
  <div class="setlist-panel">
    <div class="setlist-meta">
      <div class="meta-row">
        <input type="text" id="setlist-name" placeholder="Setlist name  (e.g. Maddie's — Fri June 20)" />
      </div>
      <div class="meta-row">
        <select id="setlist-purpose">
          <option value="">Purpose…</option>
          <option>Dance Night</option>
          <option>Festival</option>
          <option>Wedding</option>
          <option>Corporate</option>
          <option>Opener</option>
          <option>Closer</option>
          <option>Custom</option>
          <option>Template</option>
        </select>
        <input type="date" id="setlist-date" />
      </div>
    </div>

    <div class="setlist-drop" id="setlist-drop">
      <div class="drop-hint">Drag songs here — or click a song to add it</div>
    </div>

    <div id="print-footer"></div>

    <div class="setlist-footer">
      <div class="setlist-stats">
        <strong id="stat-songs">0 songs</strong> &nbsp;·&nbsp; <strong id="stat-time">0:00</strong>
      </div>
      <div class="btn-group">
        <button class="btn-secondary" onclick="openLoadModal()">Load Setlist</button>
        <button class="btn-secondary" onclick="clearSetlist()">Clear</button>
        <button class="btn-secondary" onclick="addSetBreak()">+ Set Break</button>
        <button class="btn-secondary" onclick="copyText()" title="Copy plain text for texting">Copy Text</button>
        <button class="btn-secondary" onclick="stagePrint()">Stage Print</button>
        <button class="btn-secondary" onclick="printSetlist()">Full Print</button>
        <button class="btn-secondary" onclick="printRehearsal()">Rehearsal</button>
        <button class="btn-primary" id="save-btn" onclick="saveToNotion()">Save to Notion</button>
      </div>
    </div>
  </div>

</div>

<div id="toast"></div>

<!-- Load Setlist Modal -->
<div id="load-modal-overlay">
  <div id="load-modal">
    <div id="load-modal-header">
      <h2>Load Saved Setlist</h2>
      <button id="load-modal-close" onclick="closeLoadModal()">✕</button>
    </div>
    <div id="load-modal-list">
      <div class="loading">Loading…</div>
    </div>
  </div>
</div>

<!-- Stage Print Overlay -->
<div id="stage-print-overlay">
  <button id="stage-close-btn" onclick="closeStagePrint()">✕ Close</button>
  <div id="stage-print-content"></div>
</div>

<script>
  let allSongs = [];
  let setlistSongs = [];
  let poolSortable = null;
  let setlistSortable = null;

  // ── Load from Notion ──
  async function loadSongs() {
    try {
      const res = await fetch('/.netlify/functions/songs');
      allSongs = await res.json();
      renderPool();
    } catch {
      document.getElementById('song-pool').innerHTML =
        '<div class="loading" style="color:var(--danger)">Could not load songs. Check Netlify function + NOTION_TOKEN.</div>';
    }
  }

  // ── Pool ──
  let lastFiltered = [];

  function renderPool() {
    const search = document.getElementById('search').value.toLowerCase();
    const feel   = document.getElementById('feel-filter').value;
    const hwOnly = document.getElementById('homework-filter').checked;
    const inSet  = new Set(setlistSongs.map(s => s.id));

    const filtered = allSongs.filter(s => {
      const matchSearch = !search || s.title.toLowerCase().includes(search) || s.artist.toLowerCase().includes(search);
      const matchFeel   = !feel  || s.feel.includes(feel);
      const matchHw     = !hwOnly || s.homework;
      return matchSearch && matchFeel && matchHw;
    });
    lastFiltered = filtered;

    document.getElementById('pool-count').textContent = `(${filtered.length})`;

    document.getElementById('song-pool').innerHTML = filtered.map(s => `
      <div class="song-card ${inSet.has(s.id) ? 'in-setlist' : ''}" data-id="${s.id}">
        <div class="song-info">
          <div class="song-title">${escHtml(s.title)}</div>
          <div class="song-meta">
            <span>${escHtml(s.artist)}</span>
            ${s.duration ? `<span>· ${s.duration} min</span>` : ''}
            ${s.feel.map(f => `<span class="feel-tag">${f}</span>`).join('')}
          </div>
        </div>
        ${s.homework ? `<span class="hw-badge" title="Needs practice">📝</span>` : ''}
        <span class="key-badge">${s.key || '?'}</span>
        ${s.youtube ? `<a class="yt-link" href="${s.youtube}" target="_blank" title="YouTube reference" onclick="event.stopPropagation()">▶</a>` : ''}
      </div>
    `).join('');

    document.querySelectorAll('.song-card:not(.in-setlist)').forEach(card => {
      card.addEventListener('click', () => addToSetlist(card.dataset.id));
    });

    initPoolSortable();
  }

  function addAllFiltered() {
    if (!lastFiltered.length) { showToast('No songs match the current filter', 'error'); return; }
    let added = 0;
    lastFiltered.forEach(s => {
      if (!setlistSongs.find(x => x.id === s.id)) { setlistSongs.push(s); added++; }
    });
    if (added) {
      renderSetlist();
      renderPool();
      showToast(`Added ${added} song${added > 1 ? 's' : ''} to setlist ✓`, 'success');
    } else {
      showToast('All matching songs are already in the setlist', 'error');
    }
  }

  // ── Setlist ──
  function renderSetlist() {
    const drop = document.getElementById('setlist-drop');

    if (setlistSongs.length === 0) {
      drop.innerHTML = '<div class="drop-hint">Drag songs here — or click a song to add it</div>';
    } else {
      let songNum = 0, breakNum = 0;
      drop.innerHTML = setlistSongs.map(s => {
        if (s.type === 'break') {
          breakNum++;
          return `
            <div class="set-break" data-id="${s.id}">
              <div class="set-break-line"></div>
              <span class="set-break-label">Set ${breakNum + 1}</span>
              <div class="set-break-line"></div>
              <button class="remove-btn" data-remove="${s.id}" title="Remove break">✕</button>
            </div>`;
        }
        songNum++;
        return `
          <div class="setlist-item" data-id="${s.id}">
            <span class="item-num">${songNum}</span>
            <span class="key-badge">${s.key || '?'}</span>
            <div class="item-info">
              <div class="item-title">${escHtml(s.title)}</div>
              ${s.notes ? `<div class="item-notes"><span class="item-notes-label">Rehearsal Notes:</span> ${escHtml(s.notes)}</div>` : ''}
              <div class="item-sub">${escHtml(s.artist)}${s.duration ? ` · ${s.duration} min` : ''}</div>
              ${s.youtube ? `<div class="yt-url-print">${escHtml(s.youtube)}</div>` : ''}
            </div>
            ${s.youtube ? `<a href="${s.youtube}" target="_blank" class="yt-badge" title="Watch on YouTube" onclick="event.stopPropagation()">YT</a>` : ''}
            <button class="remove-btn" data-remove="${s.id}" title="Remove">✕</button>
          </div>`;
      }).join('');

      drop.querySelectorAll('[data-remove]').forEach(btn => {
        btn.addEventListener('click', () => removeFromSetlist(btn.dataset.remove));
      });
    }

    initSetlistSortable();
    updateStats();
    renderPool();
  }

  function addToSetlist(id) {
    const song = allSongs.find(s => s.id === id);
    if (!song || setlistSongs.find(s => s.id === id)) return;
    setlistSongs.push(song);
    const searchEl = document.getElementById('search');
    searchEl.value = '';
    if (!window.matchMedia('(pointer: coarse)').matches) searchEl.focus();
    if (window.innerWidth <= 700) switchTab('setlist');
    renderSetlist();
  }

  function removeFromSetlist(id) {
    setlistSongs = setlistSongs.filter(s => s.id !== id);
    renderSetlist();
  }

  function clearSetlist() {
    if (setlistSongs.length === 0) return;
    setlistSongs = [];
    renderSetlist();
  }

  function addSetBreak() {
    setlistSongs.push({ id: `break-${Date.now()}`, type: 'break' });
    renderSetlist();
  }

  function updateStats() {
    const actualSongs = setlistSongs.filter(s => !s.type);
    const total = actualSongs.reduce((sum, s) => sum + (s.duration || 0), 0);
    const h   = Math.floor(total / 60);
    const m   = Math.floor(total % 60);
    const sec = Math.round((total % 1) * 60);
    document.getElementById('stat-songs').textContent = `${actualSongs.length} song${actualSongs.length !== 1 ? 's' : ''}`;
    document.getElementById('stat-time').textContent  = h > 0 ? `${h}h ${m}m` : `${m}:${String(sec).padStart(2,'0')}`;
    const badge = document.getElementById('tab-badge');
    badge.textContent = actualSongs.length || '';
    badge.style.display = actualSongs.length ? 'inline-block' : 'none';
  }

  // ── Sortable: pool (drag source only) ──
  function initPoolSortable() {
    if (poolSortable) { poolSortable.destroy(); poolSortable = null; }
    // On touch/mobile: skip sortable on the pool so finger scrolling works freely.
    // Songs are added by tap, not drag, on mobile.
    if (window.matchMedia('(pointer: coarse)').matches) return;
    poolSortable = Sortable.create(document.getElementById('song-pool'), {
      group: { name: 'songs', pull: 'clone', put: false },
      sort: false,
      animation: 150,
      // onEnd intentionally omitted — setlist onAdd handles all drops
    });
  }

  // ── Sortable: setlist (reorder + drop target) ──
  function initSetlistSortable() {
    if (setlistSortable) { setlistSortable.destroy(); setlistSortable = null; }
    setlistSortable = Sortable.create(document.getElementById('setlist-drop'), {
      group: { name: 'songs', pull: false, put: true },
      animation: 150,
      ghostClass: 'sortable-ghost',
      chosenClass: 'sortable-chosen',
      // On touch: wait 200ms before treating as a drag so quick swipes scroll the list
      delay: 200,
      delayOnTouchOnly: true,
      touchStartThreshold: 5,
      onAdd(evt) {
        const id = evt.item.dataset.id;
        evt.item.remove();
        addToSetlist(id);
      },
      onUpdate() {
        const items = document.querySelectorAll('#setlist-drop [data-id]');
        const reordered = [];
        items.forEach(el => {
          const s = setlistSongs.find(x => x.id === el.dataset.id);
          if (s) reordered.push(s);
        });
        setlistSongs = reordered;
        renderSetlist();
      },
    });
  }

  // ── Filters ──
  document.getElementById('search').addEventListener('input', renderPool);
  document.getElementById('feel-filter').addEventListener('change', renderPool);
  document.getElementById('homework-filter').addEventListener('change', renderPool);

  // ── Default date = today ──
  document.getElementById('setlist-date').value = new Date().toISOString().split('T')[0];

  // ── Stage Print ──
  function stagePrint() {
    if (!setlistSongs.length) { showToast('Add songs before printing', 'error'); return; }
    const name = document.getElementById('setlist-name').value || 'Setlist';
    const rawDate = document.getElementById('setlist-date').value;
    const dateStr = rawDate
      ? new Date(rawDate + 'T12:00').toLocaleDateString('en-US', { weekday: 'short', month: 'short', day: 'numeric', year: 'numeric' })
      : '';
    const actualSongs = setlistSongs.filter(s => !s.type);
    const total = actualSongs.reduce((s, x) => s + (x.duration || 0), 0);
    const h = Math.floor(total / 60), m = Math.floor(total % 60);

    // Split into two columns: at set break if present, otherwise at midpoint
    const breakIdx = setlistSongs.findIndex(s => s.type === 'break');
    let col1Songs, col2Songs, col2Label;
    if (breakIdx !== -1) {
      col1Songs = setlistSongs.slice(0, breakIdx);
      col2Songs = setlistSongs.slice(breakIdx + 1);
      col2Label = 'Set 2';
    } else {
      const mid = Math.ceil(setlistSongs.length / 2);
      col1Songs = setlistSongs.slice(0, mid);
      col2Songs = setlistSongs.slice(mid);
      col2Label = null;
    }

    function renderColRows(songs, startNum) {
      let num = startNum;
      return songs.map(s => {
        num++;
        return `
          <div class="stage-row">
            <span class="stage-num">${num}</span>
            <span class="stage-title">${escHtml(s.title)}</span>
            <span class="stage-key">${s.key || ''}</span>
          </div>`;
      }).join('');
    }

    const col1Html = renderColRows(col1Songs, 0);
    const col2Html = col2Songs.length ? renderColRows(col2Songs, col1Songs.length) : '';
    const hasBreak = breakIdx !== -1;

    document.getElementById('stage-print-content').innerHTML = `
      <div class="stage-songs" style="${col2Html ? '' : 'grid-template-columns: 1fr'}">
        <div class="stage-col">
          ${hasBreak ? '<div class="stage-col-header">Set 1</div>' : ''}
          ${col1Html}
        </div>
        ${col2Html ? `<div class="stage-col">
          ${hasBreak ? '<div class="stage-col-header">Set 2</div>' : ''}
          ${col2Html}
        </div>` : ''}
      </div>
    `;

    // Force landscape orientation for stage print
    let pageStyle = document.getElementById('stage-page-style');
    if (!pageStyle) {
      pageStyle = document.createElement('style');
      pageStyle.id = 'stage-page-style';
      document.head.appendChild(pageStyle);
    }
    pageStyle.textContent = '@page { size: landscape; margin: 0.5in; }';

    const overlay = document.getElementById('stage-print-overlay');
    overlay.classList.add('visible');

    // Explicitly hide every sibling before the print dialog opens
    const siblings = Array.from(document.body.children)
      .filter(el => el !== overlay && el.tagName !== 'SCRIPT');

    function beforePrint() {
      siblings.forEach(el => el.style.setProperty('display', 'none', 'important'));
      overlay.style.cssText += '; position:static !important;';
    }
    function afterPrint() {
      window.removeEventListener('beforeprint', beforePrint);
      window.removeEventListener('afterprint', afterPrint);
      siblings.forEach(el => el.style.removeProperty('display'));
      overlay.style.position = '';
    }
    window.addEventListener('beforeprint', beforePrint);
    window.addEventListener('afterprint', afterPrint);

    setTimeout(() => window.print(), 100);
  }

  function closeStagePrint() {
    document.getElementById('stage-print-overlay').classList.remove('visible');
    const pageStyle = document.getElementById('stage-page-style');
    if (pageStyle) pageStyle.remove();
  }

  // ── Copy Text (for texting) ──
  function copyText() {
    if (!setlistSongs.length) { showToast('Add songs before copying', 'error'); return; }
    const name = document.getElementById('setlist-name').value || 'Setlist';
    const rawDate = document.getElementById('setlist-date').value;
    const dateStr = rawDate
      ? new Date(rawDate + 'T12:00').toLocaleDateString('en-US', { weekday: 'short', month: 'short', day: 'numeric' })
      : '';
    const actualSongs = setlistSongs.filter(s => !s.type);
    const total = actualSongs.reduce((s, x) => s + (x.duration || 0), 0);
    const h = Math.floor(total / 60), m = Math.floor(total % 60);

    const header = `🎶 Órale — ${name}${dateStr ? ' (' + dateStr + ')' : ''}`;
    let copyNum = 0, copyBreak = 0;
    const lines = setlistSongs.map(s => {
      if (s.type === 'break') { copyBreak++; return `\n── Set ${copyBreak + 1} ──`; }
      copyNum++;
      let line = `${copyNum}. ${s.title} — ${s.key || '?'}`;
      if (s.tempo) line += ` · ${s.tempo} BPM`;
      return line;
    });
    const footer = `\nTotal: ${actualSongs.length} songs · ~${h > 0 ? `${h}h ${m}m` : `${Math.floor(total)}m`}`;
    const text = [header, '', ...lines, footer].join('\n');

    navigator.clipboard.writeText(text)
      .then(() => showToast('Copied to clipboard ✓', 'success'))
      .catch(() => showToast('Copy failed — try a different browser', 'error'));
  }

  // ── Print ──
  function printSetlist() {
    if (!setlistSongs.length) { showToast('Add songs before printing', 'error'); return; }
    const name = document.getElementById('setlist-name').value || 'Setlist';
    const rawDate = document.getElementById('setlist-date').value;
    const dateStr = rawDate
      ? new Date(rawDate + 'T12:00').toLocaleDateString('en-US', { year: 'numeric', month: 'long', day: 'numeric' })
      : '';
    const actualSongs = setlistSongs.filter(s => !s.type);
    const total = actualSongs.reduce((s, x) => s + (x.duration || 0), 0);
    const h = Math.floor(total / 60), m = Math.floor(total % 60);

    document.getElementById('print-header').innerHTML = `
      <h1>🎶 Órale</h1>
      <p>${escHtml(name)}${dateStr ? ' &nbsp;·&nbsp; ' + dateStr : ''}</p>
    `;
    document.getElementById('print-footer').innerHTML =
      `${actualSongs.length} songs &nbsp;·&nbsp; Total: ${h > 0 ? `${h}h ${m}m` : `${Math.floor(total)}m`}`;

    window.print();
  }

  // Same as Full Print, but with each song's Notion "Notes" shown under the title
  function printRehearsal() {
    if (!setlistSongs.length) { showToast('Add songs before printing', 'error'); return; }
    document.body.classList.add('rehearsal-print');
    function afterPrint() {
      document.body.classList.remove('rehearsal-print');
      window.removeEventListener('afterprint', afterPrint);
    }
    window.addEventListener('afterprint', afterPrint);
    printSetlist();
  }

  // ── Save to Notion ──
  async function saveToNotion() {
    if (!setlistSongs.length) { showToast('Add songs before saving', 'error'); return; }
    const name = document.getElementById('setlist-name').value.trim();
    if (!name) { showToast('Enter a setlist name first', 'error'); return; }

    const btn = document.getElementById('save-btn');
    btn.disabled = true;
    btn.textContent = 'Saving…';

    try {
      const res = await fetch('/.netlify/functions/save-setlist', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          name,
          songs: setlistSongs,
          purpose: document.getElementById('setlist-purpose').value || undefined,
          date:    document.getElementById('setlist-date').value,
        }),
      });

      const data = await res.json();
      if (data.ok) {
        showToast('Saved to Notion ✓', 'success');
      } else {
        showToast(`Save failed: ${data.error || 'unknown error'}`, 'error');
      }
    } catch {
      showToast('Save failed — check connection', 'error');
    } finally {
      btn.disabled = false;
      btn.textContent = 'Save to Notion';
    }
  }

  // ── Mobile tab switching ──
  function switchTab(tab) {
    if (window.innerWidth > 700) return;
    const isLibrary = tab === 'library';
    document.querySelector('.pool-panel').classList.toggle('panel-hidden', !isLibrary);
    document.querySelector('.setlist-panel').classList.toggle('panel-hidden', isLibrary);
    document.getElementById('tab-library').classList.toggle('active', isLibrary);
    document.getElementById('tab-setlist-btn').classList.toggle('active', !isLibrary);
  }

  // ── Load Setlist Modal ──
  async function openLoadModal() {
    document.getElementById('load-modal-overlay').classList.add('visible');
    const listEl = document.getElementById('load-modal-list');
    listEl.innerHTML = '<div class="loading">Loading saved setlists…</div>';

    try {
      const res = await fetch('/.netlify/functions/get-setlists');
      const setlists = await res.json();

      if (!setlists.length) {
        listEl.innerHTML = '<div class="loading">No saved setlists yet.</div>';
        return;
      }

      const hasExisting = setlistSongs.length > 0;
      listEl.innerHTML = setlists.map(sl => `
        <div class="setlist-option">
          <div class="setlist-option-info">
            <div class="setlist-option-name">${escHtml(sl.name)}</div>
            <div class="setlist-option-meta">${sl.date || ''}${sl.status ? ' · ' + sl.status : ''}</div>
          </div>
          <div class="setlist-option-btns">
            ${hasExisting ? `<button class="setlist-option-append" data-id="${sl.id}">Append</button>` : ''}
            <button class="setlist-option-load" data-id="${sl.id}">${hasExisting ? 'Replace' : 'Load'}</button>
          </div>
        </div>
      `).join('');

      listEl.querySelectorAll('.setlist-option-load').forEach(btn => {
        btn.addEventListener('click', () => loadSetlist(btn.dataset.id, 'replace'));
      });
      listEl.querySelectorAll('.setlist-option-append').forEach(btn => {
        btn.addEventListener('click', () => loadSetlist(btn.dataset.id, 'append'));
      });
    } catch {
      listEl.innerHTML = '<div class="loading" style="color:var(--danger)">Failed to fetch setlists.</div>';
    }
  }

  function closeLoadModal() {
    document.getElementById('load-modal-overlay').classList.remove('visible');
  }

  document.getElementById('load-modal-overlay').addEventListener('click', (e) => {
    if (e.target === document.getElementById('load-modal-overlay')) closeLoadModal();
  });

  async function loadSetlist(id, mode = 'replace') {
    closeLoadModal();
    try {
      const res = await fetch(`/.netlify/functions/get-setlists?id=${id}`);
      const { orderedIds } = await res.json();

      if (!orderedIds || !orderedIds.length) {
        showToast('Setlist has no song order saved (saved before this feature)', 'error');
        return;
      }

      const loaded = orderedIds
        .map(sid => sid === 'BREAK'
          ? { id: `break-${Date.now()}-${Math.random()}`, type: 'break' }
          : allSongs.find(s => s.id === sid))
        .filter(Boolean);

      if (!loaded.length) {
        showToast('Could not match songs — reload the page and try again', 'error');
        return;
      }

      const songCount = loaded.filter(s => !s.type).length;
      if (mode === 'append') {
        setlistSongs = [...setlistSongs, ...loaded];
        showToast(`Appended ${songCount} songs ✓`, 'success');
      } else {
        setlistSongs = loaded;
        showToast(`Loaded ${songCount} songs ✓`, 'success');
      }
      renderSetlist();
    } catch {
      showToast('Failed to load setlist', 'error');
    }
  }

  // ── Util ──
  function escHtml(str) {
    return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  function showToast(msg, type = '') {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.className = `show ${type}`;
    setTimeout(() => { t.className = ''; }, 3000);
  }

  loadSongs();
</script>
</body>
</html>
